<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Duel 2026 - Seattle Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #69BE28; }
        
        .loader {
            border-top-color: #6366f1;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#001529] text-slate-100 min-h-screen text-left text-left">
    <div id="root">
        <div class="flex flex-col items-center justify-center min-h-screen space-y-4">
            <div class="loader w-12 h-12 border-4 border-[#002244] rounded-full"></div>
            <p class="text-xs font-black uppercase tracking-[0.3em] text-[#A5ACAF] animate-pulse">Initializing Duel Engine...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURED FIREBASE PROJECT ---
        const firebaseConfig = {
            apiKey: "AIzaSyBwQiPbjSSjKRPgk7RO-6btjHeva5k7jx8",
            authDomain: "nfldraftpickem.firebaseapp.com",
            projectId: "nfldraftpickem",
            storageBucket: "nfldraftpickem.firebasestorage.app",
            messagingSenderId: "233571025329",
            appId: "1:233571025329:web:af5eb7f1bb9208c7a2fd90",
            measurementId: "G-6108FZZ5GH"
        };

        let app, auth, db, currentAppId;
        let setupError = null;

        const timeout = setTimeout(() => {
            if (!window.state?.user && !setupError) {
                setupError = "Connection Timeout: Check your internet or Firebase 'Anonymous' Auth settings.";
                window.render();
            }
        }, 8000);

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            currentAppId = 'nfl-draft-duel-2026';
        } catch (e) {
            console.error("Firebase Init Error:", e);
            setupError = "Firebase Initialization Error: " + e.message;
        }

        const DRAFT_ORDER = [
            { id: 1, team: "Las Vegas Raiders", needs: "QB, WR, OT" },
            { id: 2, team: "New York Jets", needs: "QB, EDGE, WR" },
            { id: 3, team: "Arizona Cardinals", needs: "QB, DL, EDGE" },
            { id: 4, team: "Tennessee Titans", needs: "OT, EDGE, WR" },
            { id: 5, team: "New York Giants", needs: "QB, DL, OT" },
            { id: 6, team: "Cleveland Browns", needs: "QB, OT, WR" },
            { id: 7, team: "Washington Commanders", needs: "WR, OT, CB" },
            { id: 8, team: "New Orleans Saints", needs: "QB, WR, EDGE" },
            { id: 9, team: "Kansas City Chiefs", needs: "CB, WR, OT" },
            { id: 10, team: "Carolina Panthers", needs: "QB, EDGE, CB" },
            { id: 11, team: "Miami Dolphins", needs: "OT, WR, CB" },
            { id: 12, team: "Dallas Cowboys", needs: "EDGE, DT, LB" },
            { id: 13, team: "LA Rams", needs: "WR, CB, LB" },
            { id: 14, team: "Baltimore Ravens", needs: "OT, EDGE, WR" },
            { id: 15, team: "Tampa Bay Buccaneers", needs: "EDGE, CB, OT" },
            { id: 16, team: "Seattle Seahawks", needs: "QB, DL, LB" },
            { id: 17, team: "Pittsburgh Steelers", needs: "OT, WR, CB" },
            { id: 18, team: "Minnesota Vikings", needs: "DT, EDGE, IOL" },
            { id: 19, team: "Philadelphia Eagles", needs: "LB, EDGE, WR" },
            { id: 20, team: "Indianapolis Colts", needs: "WR, CB, DT" },
            { id: 21, team: "San Francisco 49ers", needs: "OT, CB, IOL" },
            { id: 22, team: "Buffalo Bills", needs: "S, EDGE, LB" },
            { id: 23, team: "Houston Texans", needs: "IOL, DT, CB" },
            { id: 24, team: "Atlanta Falcons", needs: "EDGE, CB, WR" },
            { id: 25, team: "Detroit Lions", needs: "EDGE, CB, OT" },
            { id: 26, team: "Cincinnati Bengals", needs: "DT, TE, OT" },
            { id: 27, team: "Green Bay Packers", needs: "CB, S, IOL" },
            { id: 28, team: "Jacksonville Jaguars", needs: "OT, CB, DT" },
            { id: 29, team: "Los Angeles Chargers", needs: "WR, TE, DT" },
            { id: 30, team: "Chicago Bears", needs: "EDGE, DT, IOL" },
            { id: 31, team: "New England Patriots", needs: "OT, WR, EDGE" },
            { id: 32, team: "Denver Broncos", needs: "EDGE, CB, QB" }
        ];

        const PROSPECTS = [
            "Fernando Mendoza (QB, Indiana)", "Jeremiyah Love (RB, Notre Dame)", "Sonny Styles (LB, Ohio State)",
            "David Bailey (Edge, Texas Tech)", "Arvell Reese (Edge/LB, Ohio State)", "Carnell Tate (WR, Ohio State)",
            "Rueben Bain Jr. (Edge, Miami)", "Caleb Downs (S, Ohio State)", "Mansoor Delane (CB, LSU)",
            "Francis Mauigoa (T, Miami)", "Olaivavega Ioane (IOL, Penn State)", "Makai Lemon (WR, USC)",
            "Spencer Fano (T, Utah)", "Kenyon Sadiq (TE, Oregon)", "Emmanuel McNeil-Warren (S, Toledo)",
            "Dillon Thieneman (S, Oregon)", "Omar Cooper Jr. (WR, Indiana)", "Jordyn Tyson (WR, Arizona State)",
            "Jermod McCoy (CB, Tennessee)", "Blake Miller (T, Clemson)", "Colton Hood (CB, Tennessee)",
            "Monroe Freeling (T, Georgia)", "Denzel Boston (WR, Washington)", "Kadyn Proctor (T, Alabama)",
            "KC Concepcion (WR, Texas A&M)", "Akheem Mesidor (Edge, Miami)", "T.J. Parker (Edge, Clemson)",
            "Cashius Howell (Edge, Texas A&M)", "Keldric Faulk (Edge, Auburn)", "Caleb Lomu (T, Utah)",
            "Max Iheanachor (T, Arizona State)", "CJ Allen (LB, Georgia)", "Kayden McDonald (DT, Ohio State)",
            "Jadarian Price (RB, Notre Dame)", "Chris Johnson (CB, San Diego State)", "Ty Simpson (QB, Alabama)",
            "Anthony Hill Jr. (LB, Texas)", "Avieon Terrell (CB, Clemson)", "Peter Woods (DT, Clemson)",
            "Malachi Lawrence (Edge, UCF)", "Lee Hunter (DT, Texas Tech)", "Jacob Rodriguez (LB, Texas Tech)",
            "Brandon Cisse (CB, South Carolina)", "R Mason Thomas (Edge, Oklahoma)", "Zion Young (Edge, Missouri)",
            "Christen Miller (DT, Georgia)", "Keylan Rutledge (IOL, Georgia Tech)", "Treydan Stukes (S, Arizona)",
            "Germie Bernard (WR, Alabama)", "D'Angelo Ponds (CB, Indiana)", 
            "Arch Manning (QB, Texas)", "Nico Iamaleava (QB, Tennessee)", "Jackson Arnold (QB, Oklahoma)",
            "Dante Moore (QB, Oregon)", "Avery Johnson (QB, Kansas State)", "Zachariah Branch (WR, USC)",
            "Eugene Wilson III (WR, Florida)", "Matayo Uiagalelei (Edge, Oregon)", "Suntarine Perkins (LB, Ole Miss)",
            "Joenel Aguero (S, Georgia)"
        ];

        window.state = {
            user: null,
            roomCode: localStorage.getItem('draft_room_code') || "",
            gameState: null,
            allPlayers: [],
            myPrediction: "",
            view: 'game',
            isEditingName: false,
            tempName: "",
            showBuckeyeModal: false
        };

        window.setState = function(newState) {
            window.state = { ...window.state, ...newState };
            window.render();
        };

        async function init() {
            if (setupError) {
                window.render();
                return;
            }

            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    clearTimeout(timeout);
                    window.setState({ user: u });
                    if (window.state.roomCode) syncRoomData();
                } else {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setupError = "AUTH_DISABLED";
                        window.render();
                    }
                }
            });
        }

        let unsubRoom, unsubPlayers;
        async function syncRoomData() {
            if (!window.state.user || !window.state.roomCode) return;
            
            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', window.state.roomCode);
            unsubRoom = onSnapshot(roomRef, (snap) => {
                if (snap.exists()) {
                    window.setState({ gameState: snap.data() });
                } else {
                    setDoc(roomRef, { currentPickIndex: 0, commishId: window.state.user.uid, results: [], carryOver: 0, picksLocked: false })
                      .then(() => {
                        window.setState({ gameState: { currentPickIndex: 0, commishId: window.state.user.uid, results: [], carryOver: 0, picksLocked: false } });
                      })
                      .catch(e => { setupError = "FIRESTORE_DENIED"; window.render(); });
                }
            }, (err) => { setupError = "PERMISSION_DENIED"; window.render(); });

            const playersRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'players');
            unsubPlayers = onSnapshot(playersRef, (snap) => {
                const players = snap.docs.map(d => d.data()).filter(p => p.roomCode === window.state.roomCode);
                window.setState({ allPlayers: players });
                const me = players.find(p => p.uid === window.state.user.uid);
                if (me && !window.state.isEditingName) window.setState({ tempName: me.name });
            }, (err) => { setupError = "PERMISSION_DENIED"; window.render(); });

            const myDocId = `${window.state.roomCode}_${window.state.user.uid}`;
            const myRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', myDocId);
            try {
                const mySnap = await getDoc(myRef);
                if (!mySnap.exists()) {
                    await setDoc(myRef, { uid: window.state.user.uid, roomCode: window.state.roomCode, name: `Fan ${window.state.user.uid.slice(0, 4)}`, score: 0, predictions: {} });
                }
            } catch (e) { setupError = "FIRESTORE_WRITE_ERROR"; window.render(); }
        }

        window.createRoom = () => {
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('draft_room_code', code);
            window.setState({ roomCode: code, gameState: null });
            syncRoomData();
        };

        window.joinRoom = (code) => {
            if (!code) return;
            localStorage.setItem('draft_room_code', code.toUpperCase());
            window.setState({ roomCode: code.toUpperCase(), gameState: null });
            syncRoomData();
        };

        window.leaveRoom = () => {
            if (unsubRoom) unsubRoom();
            if (unsubPlayers) unsubPlayers();
            localStorage.removeItem('draft_room_code');
            window.setState({ roomCode: "", gameState: null, allPlayers: [] });
        };

        window.toggleLock = async () => {
            if (!window.state.roomCode || !window.state.gameState) return;
            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', window.state.roomCode);
            await updateDoc(roomRef, { picksLocked: !window.state.gameState.picksLocked });
        };

        window.lockPick = async (pick) => {
            if (!window.state.roomCode || !window.state.gameState || window.state.gameState.picksLocked) return;
            
            // Buckeye Check
            if (pick.toLowerCase().includes("ohio state")) {
                window.setState({ showBuckeyeModal: true });
            }

            const docId = `${window.state.roomCode}_${window.state.user.uid}`;
            const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
            await updateDoc(ref, { [`predictions.${window.state.gameState.currentPickIndex}`]: pick });
        };

        window.unselectPick = async () => {
            if (!window.state.roomCode || !window.state.gameState || window.state.gameState.picksLocked) return;
            const docId = `${window.state.roomCode}_${window.state.user.uid}`;
            const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
            await updateDoc(ref, { [`predictions.${window.state.gameState.currentPickIndex}`]: null });
        };

        window.resolvePick = async (player) => {
            const idx = window.state.gameState.currentPickIndex;
            const correctOnes = window.state.allPlayers.filter(p => p.predictions?.[idx] === player);
            const isLoneWinner = correctOnes.length === 1;
            
            const currentCarry = Number(window.state.gameState.carryOver || 0);
            const roundValue = 1 + currentCarry;

            let winnerMsg = "";
            let nextCarry = 0;

            if (isLoneWinner) {
                const winner = correctOnes[0];
                const docId = `${window.state.roomCode}_${winner.uid}`;
                const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
                const pData = window.state.allPlayers.find(p => p.uid === winner.uid);
                await updateDoc(ref, { score: (pData.score || 0) + roundValue });
                
                winnerMsg = `${winner.name} wins ${roundValue} pts`;
                nextCarry = 0;
            } else {
                winnerMsg = correctOnes.length > 1 ? `Shared (Carry ${roundValue})` : `No one (Carry ${roundValue})`;
                nextCarry = roundValue; 
            }

            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', window.state.roomCode);
            await updateDoc(roomRef, {
                currentPickIndex: idx + 1,
                carryOver: nextCarry,
                picksLocked: false, 
                results: [...(window.state.gameState.results || []), {
                    pick: idx + 1,
                    player: player,
                    winner: winnerMsg,
                    wasLone: isLoneWinner,
                    ptsValue: roundValue
                }]
            });
            window.setState({ myPrediction: "" });
        };

        window.updateName = async () => {
            const input = document.getElementById('nameInput');
            const newName = input ? input.value.trim() : null;
            if (!newName || !window.state.roomCode || !window.state.user) return;
            
            const docId = `${window.state.roomCode}_${window.state.user.uid}`;
            const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
            
            try {
                window.setState({ isEditingName: false }); 
                await updateDoc(ref, { name: newName });
            } catch (e) {
                console.error("Update Name Error:", e);
                window.setState({ isEditingName: true }); 
            }
        };

        window.render = function() {
            const root = document.getElementById('root');
            
            if (setupError) {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                        <div class="bg-rose-500/10 border border-rose-500/20 p-8 rounded-3xl max-w-md shadow-2xl">
                            <i data-lucide="alert-circle" class="text-rose-500 w-16 h-16 mx-auto mb-6"></i>
                            <h1 class="text-2xl font-black text-rose-200 mb-2 uppercase italic tracking-tighter">Connection Error</h1>
                            <p class="text-sm text-slate-400 mb-8 font-medium leading-relaxed">${setupError}</p>
                            <button onclick="window.location.reload()" class="w-full py-4 bg-[#002244] hover:bg-slate-700 rounded-2xl font-black uppercase text-xs tracking-widest transition-all">Retry Connection</button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (!window.state.user) return; 

            if (!window.state.roomCode) {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center space-y-8 animate-in fade-in duration-700">
                        <div class="bg-[#69BE28] p-6 rounded-3xl shadow-2xl shadow-[#69BE28]/30 rotate-3 border-4 border-[#002244]">
                            <i data-lucide="zap" class="text-[#002244] fill-[#002244] w-12 h-12"></i>
                        </div>
                        <div>
                            <h1 class="text-5xl font-black italic uppercase tracking-tighter text-white">Draft Duel <span class="text-[#69BE28]">2026</span></h1>
                            <p class="text-[#A5ACAF] font-bold uppercase text-[10px] tracking-[0.3em] mt-2">Seattle Edition Multiplayer</p>
                        </div>
                        <div class="w-full max-w-xs space-y-4 text-left">
                            <button onclick="window.createRoom()" class="w-full bg-[#69BE28] hover:bg-[#5da823] text-[#002244] py-5 rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl shadow-[#69BE28]/10">Create Room</button>
                            <div class="flex gap-2 text-left">
                                <input id="joinInput" placeholder="4-CHAR CODE" class="flex-grow bg-[#002244] border border-slate-700 rounded-2xl px-4 py-4 text-center font-mono font-bold tracking-[0.4em] outline-none focus:ring-2 ring-[#69BE28] transition-all uppercase text-[#69BE28]">
                                <button onclick="window.joinRoom(document.getElementById('joinInput').value)" class="bg-[#A5ACAF] hover:bg-slate-400 px-6 rounded-2xl font-black hover:bg-slate-700 transition-all text-[#002244]"><i data-lucide="log-in" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (!window.state.gameState) {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen space-y-4">
                        <div class="loader w-12 h-12 border-4 border-[#002244] rounded-full"></div>
                        <p class="text-xs font-black uppercase tracking-[0.3em] text-[#A5ACAF] animate-pulse">Entering Room ${window.state.roomCode}...</p>
                    </div>
                `;
                return;
            }

            const results = window.state.gameState.results || [];
            const draftedPlayers = results.map(r => r.player);
            const availableProspects = PROSPECTS.filter(p => !draftedPlayers.includes(p));
            const cur = DRAFT_ORDER[window.state.gameState.currentPickIndex] || { team: "Draft Complete", id: "END" };
            const me = window.state.allPlayers.find(p => p.uid === window.state.user.uid);
            const hasPicked = me?.predictions?.[window.state.gameState.currentPickIndex];
            const picksLocked = window.state.gameState.picksLocked;
            const potValue = 1 + Number(window.state.gameState.carryOver || 0);
            const submittedCount = window.state.allPlayers.filter(p => p.predictions?.[window.state.gameState.currentPickIndex]).length;
            const totalPlayers = window.state.allPlayers.length;

            root.innerHTML = `
                <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6 text-left">
                    ${window.state.showBuckeyeModal ? `
                        <div class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md animate-in fade-in duration-300">
                            <div class="bg-[#002244] border-4 border-[#69BE28] p-8 rounded-[2.5rem] max-w-sm w-full text-center shadow-[0_0_50px_rgba(105,190,40,0.3)]">
                                <i data-lucide="frown" class="w-16 h-16 text-[#69BE28] mx-auto mb-6"></i>
                                <h2 class="text-2xl font-black uppercase italic tracking-tighter text-white mb-2">Buckeye Alert!</h2>
                                <p class="text-[#A5ACAF] font-bold mb-8 leading-relaxed">Why would you select a crappy Buckeye?</p>
                                <button onclick="window.setState({showBuckeyeModal: false})" 
                                        class="w-full py-4 bg-[#69BE28] text-[#002244] rounded-2xl font-black uppercase tracking-widest hover:bg-[#5da823] transition-all">
                                    I'm Sorry
                                </button>
                            </div>
                        </div>
                    ` : ''}

                    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div class="flex items-center gap-4">
                             <div class="bg-[#69BE28] p-3 rounded-2xl shadow-lg shadow-[#69BE28]/20 rotate-3 border-2 border-[#002244]"><i data-lucide="zap" class="w-6 h-6 text-[#002244] fill-[#002244]"></i></div>
                             <div class="text-left text-left">
                                <h1 class="font-black uppercase italic text-xl tracking-tighter text-white">Draft Duel <span class="text-[#69BE28]">2026</span></h1>
                                <div class="flex items-center gap-3 text-[10px] text-[#A5ACAF] font-black tracking-widest">
                                    <span class="bg-[#69BE28]/10 text-[#69BE28] px-2 py-0.5 rounded uppercase border border-[#69BE28]/20">Lobby: ${window.state.roomCode}</span>
                                    <button onclick="window.leaveRoom()" class="hover:text-rose-400 uppercase transition-colors">Exit Room</button>
                                </div>
                             </div>
                        </div>
                        <nav class="flex bg-[#002244] p-1.5 rounded-2xl border border-slate-700 shadow-inner">
                            <button onclick="window.setState({view: 'game'})" class="px-8 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${window.state.view === 'game' ? 'bg-[#69BE28] text-[#002244] shadow-lg' : 'text-[#A5ACAF] hover:text-white'}">Game</button>
                            <button onclick="window.setState({view: 'standings'})" class="px-8 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${window.state.view === 'standings' ? 'bg-[#69BE28] text-[#002244] shadow-lg' : 'text-[#A5ACAF] hover:text-white'}">Standings</button>
                        </nav>
                    </header>

                    ${window.state.view === 'game' ? `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                            <div class="md:col-span-2 space-y-6 text-left">
                                <div class="bg-gradient-to-br from-[#002244] to-[#001529] border border-slate-700 p-10 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                                    <div class="absolute -top-12 -right-12 opacity-[0.03] rotate-12"><i data-lucide="clock" class="w-64 h-64 text-[#A5ACAF]"></i></div>
                                    <div class="relative z-10 text-left">
                                        <div class="flex flex-wrap justify-between items-start mb-6 gap-3">
                                            <div class="inline-flex items-center gap-2
