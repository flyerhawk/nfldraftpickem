        body { font-family: 'Inter', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- STEP 1: CONFIGURE YOUR DATABASE ---
        // 1. Go to https://console.firebase.google.com
        // 2. Create a new project.
        // 3. Add a "Web App" to get your config object.
        // 4. Paste your config values below:
        const firebaseConfig = {
          apiKey: "AIzaSyBwQiPbjSSjKRPgk7RO-6btjHeva5k7jx8",
          authDomain: "nfldraftpickem.firebaseapp.com",
          projectId: "nfldraftpickem",
          storageBucket: "nfldraftpickem.firebasestorage.app",
          messagingSenderId: "233571025329",
          appId: "1:233571025329:web:e78fe3d5c6a991e1a2fd90",
          measurementId: "G-2M82MGXNX6"
        };
        // Internal setup
        let app, auth, db, currentAppId;
        let configError = false;
        let connectionError = null;

        try {
            const isConfigEmpty = !firebaseConfig.apiKey;
            const envConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;
            
            if (isConfigEmpty && !envConfig) {
                configError = true;
            } else {
                app = initializeApp(isConfigEmpty ? envConfig : firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                currentAppId = window.__app_id || 'nfl-draft-duel-2026';
            }
        } catch (e) {
            console.error("Firebase Init Error:", e);
            configError = true;
        }

        const DRAFT_ORDER = [
            { id: 1, team: "Las Vegas Raiders", needs: "QB, WR, OL" },
            { id: 2, team: "New York Jets", needs: "QB, EDGE, WR" },
            { id: 3, team: "Arizona Cardinals", needs: "QB, OL, EDGE" },
            { id: 4, team: "Tennessee Titans", needs: "OL, EDGE, WR" },
            { id: 5, team: "New York Giants", needs: "DL, OL, CB" },
            { id: 6, team: "Cleveland Browns", needs: "QB, OL, WR" },
            { id: 7, team: "Washington Commanders", needs: "WR, EDGE, OL" },
            { id: 8, team: "New Orleans Saints", needs: "WR, EDGE, CB" },
            { id: 9, team: "Kansas City Chiefs", needs: "CB, WR, EDGE" },
            { id: 10, team: "New York Giants (via CIN)", needs: "DL, OL, CB" }
        ];

        const PROSPECTS = [
            "Fernando Mendoza (QB, Indiana)", "David Bailey (EDGE, Texas Tech)",
            "Arvell Reese (LB, Ohio State)", "Mansoor Delane (CB, LSU)",
            "Jeremiyah Love (RB, Notre Dame)", "Carnell Tate (WR, Ohio State)",
            "Rueben Bain Jr. (EDGE, Miami)", "Francis Mauigoa (OT, Miami)",
            "Sonny Styles (LB, Ohio State)", "Caleb Downs (S, Ohio State)"
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            user: null,
            roomCode: localStorage.getItem('draft_room_code') || "",
            gameState: null,
            allPlayers: [],
            myPrediction: "",
            view: 'game',
            isEditingName: false,
            tempName: ""
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- FIREBASE LOGIC ---
        async function init() {
            if (configError) {
                render();
                return;
            }

            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    setState({ user: u });
                    if (state.roomCode) syncRoomData();
                } else {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth Error:", err);
                        connectionError = "Authentication Failed. Please enable 'Anonymous' sign-in in the Firebase Console (Build > Authentication > Sign-in method).";
                        render();
                    }
                }
            });
        }

        let unsubRoom, unsubPlayers;
        async function syncRoomData() {
            if (!state.user || !state.roomCode) return;
            
            // Sync Game State
            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', state.roomCode);
            unsubRoom = onSnapshot(roomRef, (snap) => {
                if (snap.exists()) {
                    setState({ gameState: snap.data() });
                } else {
                    setDoc(roomRef, { currentPickIndex: 0, commishId: state.user.uid, results: [] })
                      .catch(e => {
                          console.error("Firestore Write Error:", e);
                          connectionError = "Database Access Denied. Ensure Firestore Rules are set to 'allow read, write' for testing.";
                          render();
                      });
                }
            }, (err) => {
                console.error("Room Sync Error:", err);
                connectionError = "Firestore Error: " + err.message;
                render();
            });

            // Sync Players
            const playersRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'players');
            unsubPlayers = onSnapshot(playersRef, (snap) => {
                const players = snap.docs.map(d => d.data()).filter(p => p.roomCode === state.roomCode);
                setState({ allPlayers: players });
                const me = players.find(p => p.uid === state.user.uid);
                if (me && !state.tempName) setState({ tempName: me.name });
            }, (err) => {
                console.error("Players Sync Error:", err);
                connectionError = "Firestore Error: " + err.message;
                render();
            });

            // Register me
            const myDocId = `${state.roomCode}_${state.user.uid}`;
            const myRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', myDocId);
            try {
                const mySnap = await getDoc(myRef);
                if (!mySnap.exists()) {
                    await setDoc(myRef, { 
                        uid: state.user.uid, 
                        roomCode: state.roomCode, 
                        name: `Fan ${state.user.uid.slice(0, 4)}`, 
                        score: 0, 
                        predictions: {} 
                    });
                }
            } catch (e) {
                console.error("Registration Error:", e);
                connectionError = "Registration Failed: " + e.message;
                render();
            }
        }

        // --- ACTIONS ---
        window.createRoom = () => {
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('draft_room_code', code);
            setState({ roomCode: code });
            syncRoomData();
        };

        window.joinRoom = (code) => {
            if (!code) return;
            localStorage.setItem('draft_room_code', code.toUpperCase());
            setState({ roomCode: code.toUpperCase() });
            syncRoomData();
        };

        window.leaveRoom = () => {
