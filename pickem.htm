<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Duel 2026 - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- STEP 1: CONFIGURE YOUR DATABASE ---
        // 1. Go to https://console.firebase.google.com
        // 2. Create a new project.
        // 3. Add a "Web App" to get your config object.
        // 4. Paste your config values below:
        const firebaseConfig = {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // Internal setup
        let app, auth, db, currentAppId;
        let configError = false;

        try {
            // Check if user provided config, or fallback to environment (Gemini preview only)
            const isConfigEmpty = !firebaseConfig.apiKey;
            const envConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;
            
            if (isConfigEmpty && !envConfig) {
                configError = true;
            } else {
                app = initializeApp(isConfigEmpty ? envConfig : firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                currentAppId = window.__app_id || 'nfl-draft-duel-2026';
            }
        } catch (e) {
            console.error("Firebase Init Error:", e);
            configError = true;
        }

        const DRAFT_ORDER = [
            { id: 1, team: "Las Vegas Raiders", needs: "QB, WR, OL" },
            { id: 2, team: "New York Jets", needs: "QB, EDGE, WR" },
            { id: 3, team: "Arizona Cardinals", needs: "QB, OL, EDGE" },
            { id: 4, team: "Tennessee Titans", needs: "OL, EDGE, WR" },
            { id: 5, team: "New York Giants", needs: "DL, OL, CB" },
            { id: 6, team: "Cleveland Browns", needs: "QB, OL, WR" },
            { id: 7, team: "Washington Commanders", needs: "WR, EDGE, OL" },
            { id: 8, team: "New Orleans Saints", needs: "WR, EDGE, CB" },
            { id: 9, team: "Kansas City Chiefs", needs: "CB, WR, EDGE" },
            { id: 10, team: "New York Giants (via CIN)", needs: "DL, OL, CB" }
        ];

        const PROSPECTS = [
            "Fernando Mendoza (QB, Indiana)", "David Bailey (EDGE, Texas Tech)",
            "Arvell Reese (LB, Ohio State)", "Mansoor Delane (CB, LSU)",
            "Jeremiyah Love (RB, Notre Dame)", "Carnell Tate (WR, Ohio State)",
            "Rueben Bain Jr. (EDGE, Miami)", "Francis Mauigoa (OT, Miami)",
            "Sonny Styles (LB, Ohio State)", "Caleb Downs (S, Ohio State)"
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            user: null,
            roomCode: localStorage.getItem('draft_room_code') || "",
            gameState: null,
            allPlayers: [],
            myPrediction: "",
            view: 'game',
            isEditingName: false,
            tempName: ""
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- FIREBASE LOGIC ---
        async function init() {
            if (configError) {
                render();
                return;
            }

            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    setState({ user: u });
                    if (state.roomCode) syncRoomData();
                } else {
                    await signInAnonymously(auth);
                }
            });
        }

        let unsubRoom, unsubPlayers;
        async function syncRoomData() {
            if (!state.user || !state.roomCode) return;
            
            // Sync Game State
            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', state.roomCode);
            unsubRoom = onSnapshot(roomRef, (snap) => {
                if (snap.exists()) {
                    setState({ gameState: snap.data() });
                } else {
                    setDoc(roomRef, { currentPickIndex: 0, commishId: state.user.uid, results: [] });
                }
            });

            // Sync Players
            const playersRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'players');
            unsubPlayers = onSnapshot(playersRef, (snap) => {
                const players = snap.docs.map(d => d.data()).filter(p => p.roomCode === state.roomCode);
                setState({ allPlayers: players });
                const me = players.find(p => p.uid === state.user.uid);
                if (me && !state.tempName) setState({ tempName: me.name });
            });

            // Register me
            const myDocId = `${state.roomCode}_${state.user.uid}`;
            const myRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', myDocId);
            const mySnap = await getDoc(myRef);
            if (!mySnap.exists()) {
                await setDoc(myRef, { 
                    uid: state.user.uid, 
                    roomCode: state.roomCode, 
                    name: `Fan ${state.user.uid.slice(0, 4)}`, 
                    score: 0, 
                    predictions: {} 
                });
            }
        }

        // --- ACTIONS ---
        window.createRoom = () => {
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('draft_room_code', code);
            setState({ roomCode: code });
            syncRoomData();
        };

        window.joinRoom = (code) => {
            if (!code) return;
            localStorage.setItem('draft_room_code', code.toUpperCase());
            setState({ roomCode: code.toUpperCase() });
            syncRoomData();
        };

        window.leaveRoom = () => {
            if (unsubRoom) unsubRoom();
            if (unsubPlayers) unsubPlayers();
            localStorage.removeItem('draft_room_code');
            setState({ roomCode: "", gameState: null, allPlayers: [] });
        };

        window.lockPick = async (pick) => {
            const docId = `${state.roomCode}_${state.user.uid}`;
            const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
            await updateDoc(ref, { [`predictions.${state.gameState.currentPickIndex}`]: pick });
        };

        window.resolvePick = async (player) => {
            const idx = state.gameState.currentPickIndex;
            const correctOnes = state.allPlayers.filter(p => p.predictions?.[idx] === player);
            const isLoneWinner = correctOnes.length === 1;

            if (isLoneWinner) {
                const docId = `${state.roomCode}_${correctOnes[0].uid}`;
                const ref = doc(db, 'artifacts', currentAppId, 'public', 'data', 'players', docId);
                await updateDoc(ref, { score: (correctOnes[0].score || 0) + 1 });
            }

            const roomRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'rooms', state.roomCode);
            await updateDoc(roomRef, {
                currentPickIndex: idx + 1,
                results: [...state.gameState.results, {
                    pick: idx + 1,
                    player: player,
                    winner: isLoneWinner ? correctOnes[0].name : "No Points"
                }]
            });
        };

        // --- RENDERER ---
        function render() {
            const root = document.getElementById('root');
            
            // Show setup instructions if config is missing
            if (configError) {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center space-y-6">
                        <div class="bg-amber-500/10 border border-amber-500/20 p-8 rounded-3xl max-w-md">
                            <i data-lucide="alert-triangle" class="text-amber-500 w-12 h-12 mx-auto mb-4"></i>
                            <h1 class="text-xl font-bold text-amber-200 mb-2 uppercase tracking-tight">Database Setup Required</h1>
                            <p class="text-sm text-slate-400 mb-6">To run this app on Netlify, you must provide your own Firebase configuration keys inside the code.</p>
                            <div class="text-left bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-500 mb-4">
                                1. Go to console.firebase.google.com<br>
                                2. Create a Project<br>
                                3. Copy Web Config<br>
                                4. Paste into 'firebaseConfig' in this file
                            </div>
                            <p class="text-[10px] text-slate-600 uppercase font-black tracking-widest">Open the file in a text editor to update.</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (!state.user) {
                root.innerHTML = `<div class="flex items-center justify-center h-screen uppercase text-xs tracking-widest font-bold text-slate-700 animate-pulse">Connecting to Database...</div>`;
                return;
            }

            if (!state.roomCode) {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center space-y-8">
                        <div class="bg-indigo-600 p-6 rounded-3xl shadow-2xl shadow-indigo-500/20 rotate-3">
                            <i data-lucide="zap" class="text-white fill-white w-12 h-12"></i>
                        </div>
                        <div>
                            <h1 class="text-5xl font-black italic uppercase tracking-tighter">Draft Duel <span class="text-indigo-400">2026</span></h1>
                            <p class="text-slate-500 font-medium">Public Multiplayer Mode</p>
                        </div>
                        <div class="w-full max-w-xs space-y-4">
                            <button onclick="createRoom()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black uppercase tracking-widest transition-all">Create Room</button>
                            <div class="flex gap-2">
                                <input id="joinInput" placeholder="CODE" class="flex-grow bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 text-center font-mono font-bold tracking-widest outline-none focus:ring-2 ring-indigo-500">
                                <button onclick="joinRoom(document.getElementById('joinInput').value)" class="bg-slate-800 px-6 rounded-2xl font-black"><i data-lucide="log-in"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const cur = DRAFT_ORDER[state.gameState?.currentPickIndex] || { team: "Draft Over", id: "END" };
            const me = state.allPlayers.find(p => p.uid === state.user.uid);
            const hasPicked = me?.predictions?.[state.gameState?.currentPickIndex];

            root.innerHTML = `
                <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
                    <header class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-3">
                             <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="zap" class="w-5 h-5 text-white fill-white"></i></div>
                             <div>
                                <h1 class="font-black uppercase italic text-lg">Draft Duel</h1>
                                <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold">
                                    <span class="bg-indigo-500/10 text-indigo-400 px-2 rounded uppercase tracking-widest">Lobby: ${state.roomCode}</span>
                                    <button onclick="leaveRoom()" class="hover:text-rose-400 uppercase">Leave</button>
                                </div>
                             </div>
                        </div>
                        <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                            <button onclick="setState({view: 'game'})" class="px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest ${state.view === 'game' ? 'bg-indigo-600 text-white' : 'text-slate-500'}">Game</button>
                            <button onclick="setState({view: 'standings'})" class="px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest ${state.view === 'standings' ? 'bg-indigo-600 text-white' : 'text-slate-500'}">Standings</button>
                        </div>
                    </header>

                    ${state.view === 'game' ? `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-2 space-y-6">
                                <div class="bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-700 p-8 rounded-3xl relative overflow-hidden shadow-2xl">
                                    <div class="relative z-10">
                                        <div class="mb-2 inline-block px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-indigo-400 text-[10px] font-bold uppercase">Pick #${cur.id}</div>
                                        <h2 class="text-4xl font-black uppercase italic mb-1">${cur.team}</h2>
                                        <p class="text-xs text-slate-500 italic mb-8">Needs: ${cur.needs || '---'}</p>

                                        ${cur.id !== "END" ? (
                                            hasPicked ? `
                                                <div class="bg-emerald-500/10 border border-emerald-500/20 p-5 rounded-2xl flex items-center gap-4">
                                                    <i data-lucide="check-circle" class="text-emerald-500"></i>
                                                    <div>
                                                        <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Locked In</p>
                                                        <p class="font-bold text-lg">${hasPicked}</p>
                                                    </div>
                                                </div>
                                            ` : `
                                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                                                    ${PROSPECTS.map(p => `<button onclick="lockPick('${p}')" class="text-left px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold hover:border-slate-500 transition-all">${p}</button>`).join('')}
                                                </div>
                                            `
                                        ) : `<div class="text-center font-black text-slate-600 py-10 uppercase tracking-widest">Draft Concluded</div>`}
                                    </div>
                                </div>

                                ${state.gameState?.commishId === state.user.uid && cur.id !== "END" ? `
                                    <div class="bg-slate-900 border-2 border-dashed border-slate-800 p-6 rounded-3xl">
                                        <h3 class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4"></i> Commish Resolution</h3>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                                            ${PROSPECTS.map(p => `<button onclick="resolvePick('${p}')" class="text-left px-3 py-2 bg-indigo-500/5 border border-indigo-500/20 rounded-lg text-[10px] font-bold text-indigo-300 uppercase">${p}</button>`).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="space-y-6">
                                <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl">
                                    <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Lobby Members (${state.allPlayers.length})</h4>
                                    <div class="space-y-4">
                                        ${state.allPlayers.sort((a,b)=>b.score-a.score).map(p => `
                                            <div class="flex justify-between items-center">
                                                <div class="flex items-center gap-2">
                                                    <div class="w-2 h-2 rounded-full ${p.predictions?.[state.gameState?.currentPickIndex] ? 'bg-emerald-500' : 'bg-slate-700'}"></div>
                                                    <span class="text-sm font-bold ${p.uid === state.user.uid ? 'text-indigo-400' : ''}">${p.name}</span>
                                                </div>
                                                <span class="font-black text-indigo-400">${p.score}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ` : `
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                             <div class="p-8 bg-indigo-900/20 border-b border-slate-800">
                                <h2 class="text-3xl font-black italic uppercase flex items-center gap-3"><i data-lucide="crown" class="text-yellow-500"></i> Leaderboard</h2>
                             </div>
                             <div class="p-8 space-y-8">
                                <table class="w-full text-left">
                                    <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                        <th class="pb-2">Player</th>
                                        <th class="pb-2 text-right">Points</th>
                                    </tr>
                                    ${state.allPlayers.sort((a,b)=>b.score-a.score).map(p => `
                                        <tr class="border-b border-slate-800/50">
                                            <td class="py-5 font-bold">${p.name}</td>
                                            <td class="py-5 text-right font-black text-2xl text-indigo-400">${p.score}</td>
                                        </tr>
                                    `).join('')}
                                </table>
                             </div>
                        </div>
                    `}
                </div>
            `;
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
